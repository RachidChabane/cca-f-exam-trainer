name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Allow read access by default; the deploy job widens this for itself.
permissions:
  contents: read

jobs:
  # 1) Type-check, schema validation, and deterministic fact-checking.
  validate:
    name: Validate · fact-check · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate data schema
        run: npm run check:data
      - name: Fact-check exam parameters (deterministic)
        run: npm run fact-check
      - name: Type-check & production build
        run: npm run build

  # 2) End-to-end tests against the real production bundle (vite preview).
  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E suite
        run: npm run test:e2e # pretest:e2e builds the production bundle first
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # 3) Optional AI fact-check. Runs only when an ANTHROPIC_API_KEY secret exists;
  #    a safe no-op otherwise, and never blocks deploy (advisory only).
  fact-check-llm:
    name: AI fact-check (optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: AI review of answer keys
        run: npm run fact-check:llm
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # 4) Deploy to GitHub Pages — only after validate + e2e pass on main.
  deploy:
    name: Deploy to GitHub Pages
    needs: [validate, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    # Serialize Pages deploys and never cancel one mid-flight (GitHub's
    # recommended setting for the deploy-pages action). Scoped to this job so
    # validate/e2e on other refs aren't queued behind a deploy.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build for GitHub Pages (project base path)
        run: npm run build
        env:
          VITE_BASE: /cca-f-exam-trainer/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
